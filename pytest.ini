[pytest]
# pytest configuration for sage-github-manager

# Test file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test discovery
testpaths = tests

# Exclude patterns
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv
    node_modules
    .pytest_cache

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    network: Tests that require network access
    github_api: Tests that call GitHub API (requires GITHUB_TOKEN)

# Coverage options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --color=yes
    # Coverage reporting
    --cov=sage_github
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    # Fail on warnings (optional, can be removed if too strict)
    # -W error::DeprecationWarning

# Minimum coverage threshold (optional)
# [coverage:report]
# fail_under = 80

# Coverage paths
[coverage:run]
source = src/sage_github
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
