# Ruff configuration for sage-github-manager
# Unified linting and formatting configuration

target-version = "py310"
line-length = 100

# Exclude directories
extend-exclude = [
    "build",
    "dist",
    ".venv",
    "venv",
    ".git",
    "__pycache__",
    "*.egg-info",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
]

[lint]
# Enable rule sets
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "C90",  # mccabe complexity
]

# Global ignore rules
ignore = [
    "E501",   # line too long (handled by formatter)
    "B904",   # raise-without-from-inside-except
    "B008",   # function-call-in-default-argument (needed for Typer)
    "C901",   # complex-structure (too-complex function)
    "E402",   # module-import-not-at-top-of-file
]

# Per-file ignore rules
[lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused-import (re-exports)
"tests/*.py" = ["F401", "F811"]  # Allow test fixtures

# Formatting configuration
[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# Import sorting
[lint.isort]
known-first-party = ["sage_github"]
force-single-line = false
force-sort-within-sections = true
